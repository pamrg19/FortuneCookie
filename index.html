<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"> 
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surprise me</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>︵‿︵‿୨♡୧‿︵‿︵</h1>
    <div id="display">I have a revelation for you</div>
    <button id="surprise">Ta da!</button> 
  </div>
  
  <div class="input-section">
    <input type="text" id="phrase-input" placeholder="Add your own revelation...">
    <button id="add-phrase">Send to the universe</button>
  </div>
  
  <div class="input-section">
    <input type="url" id="link-input" placeholder="Add a fun link (YouTube, Spotify, etc.)">
    <button id="add-link">Share</button>
  </div>

  <!-- TEST BUTTON -->
  <!--<button id="test" style="background: red; color: white; padding: 10px;">🔍 TEST LINKS</button>-->
  <!-- Add this button after your test button -->
<!--<button id="force-links" style="background: green; color: white; padding: 10px;">💚 FORCE CREATE LINKS</button>-->

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBTeNwxgCYUPNCkw-QLFV4H4zcln46VAvQ",
      authDomain: "revelation-69e14.firebaseapp.com",
      databaseURL: "https://revelation-69e14-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "revelation-69e14",
      storageBucket: "revelation-69e14.firebasestorage.app",
      messagingSenderId: "106882814085",
      appId: "1:106882814085:web:9c5a52b1a5a8c76bb099ec",
      measurementId: "G-HBJSF7Y29H"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    const phrasesRef = ref(database, 'phrases');
    const linksRef = ref(database, 'links');

    let phrases = [];
    let links = [];
    let lastShown = { type: null, content: null };

    const images = [
      "https://images.metmuseum.org/CRDImages/ep/original/DP-41223-001.jpg",
      "https://images.metmuseum.org/CRDImages/ep/original/DP346475.jpg",
      "https://images.metmuseum.org/CRDImages/ep/original/DP-17161-001.jpg",
      "https://images.metmuseum.org/CRDImages/ep/original/DT7098.jpg",
      "https://images.metmuseum.org/CRDImages/ep/original/DP-19451-001.jpg",
      "https://science.nasa.gov/wp-content/uploads/2024/05/hubble-hptau-wfc3-1-flat-finalok.jpg",
      "https://science.nasa.gov/wp-content/uploads/2023/07/41156165560-4438592e93-o.jpg"
  ];

    const defaultPhrases = [
      "You honestly expect me to believe that people go on vacations without making a spreadsheet of fun first? - The Wedding People",
      "I just mean, a story can be beautiful not because of the way it ends. But because of the way it's written. - The Wedding People",
      "Don't work the system. Outsmart it. - Lessons in Chemistry",
      "You should watch Frieren",
      "Justo antes de quedarse dormida, se dio cuenta de que era verdad: había conseguido todo lo que quería. Sin embargo, lamentaba no haber deseado algo más. - La Biblioteca de Paris"
    ];

    const defaultLinks = [
      "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
      "https://museum.unesco.org/",
      "https://neal.fun/",
      "https://www.youtube.com/watch?v=gO8N3L_aERg",
      "https://www.youtube.com/watch?v=Vmb1tqYqyII",
      "https://www.littlevintagephotobooth.com/",
      "https://ntho6.github.io/CMIYGL/",
      "https://theuselessweb.com/",
      "https://rec0ded88.com/",
      "https://imagine.gsfc.nasa.gov/hst_bday/",
                
    ];

    // Load phrases
    onValue(phrasesRef, (snapshot) => {
      if (snapshot.exists()) {
        phrases = snapshot.val();
      } else {
        phrases = defaultPhrases;
        set(phrasesRef, phrases);
      }
      console.log('PHRASES:', phrases);
    });

    // Load links
    onValue(linksRef, (snapshot) => {
      if (snapshot.exists()) {
        links = snapshot.val();
      } else {
        links = defaultLinks;
        set(linksRef, links);
      }
      console.log('LINKS:', links);
    });

    // TEST BUTTON - Click this to verify links work
    document.getElementById('test').addEventListener('click', () => {
      const display = document.getElementById('display');
      console.log('TEST: Phrases array:', phrases);
      console.log('TEST: Images array:', images);
      console.log('TEST: Links array:', links);
      
      if (links.length > 0) {
        const testLink = links[0];
        display.innerHTML = '<a href="' + testLink + '" target="_blank" style="color: #ff6b9d; font-size: 1.2rem;">TEST LINK: ' + testLink + '</a>';
        alert('Links array has ' + links.length + ' items!\nFirst link: ' + testLink);
      } else {
        alert('ERROR: Links array is EMPTY!');
      }
    });

    // SURPRISE BUTTON
    document.getElementById('surprise').addEventListener('click', () => {
      const display = document.getElementById('display');
      
      console.log('=== CLICK ===');
      console.log('Phrases count:', phrases.length);
      console.log('Images count:', images.length);
      console.log('Links count:', links.length);

      // Build pool
      const pool = [];
      
      console.log('Adding phrases...');
      for (let i = 0; i < phrases.length; i++) {
        pool.push({ type: 'phrase', content: phrases[i] });
        console.log('  Added phrase', i);
      }
      
      console.log('Adding images...');
      for (let i = 0; i < images.length; i++) {
        pool.push({ type: 'image', content: images[i] });
        console.log('  Added image', i);
      }
      
      console.log('Adding links...');
      for (let i = 0; i < links.length; i++) {
        pool.push({ type: 'link', content: links[i] });
        console.log('  Added link', i, ':', links[i]);
      }

      console.log('TOTAL POOL SIZE:', pool.length);
      console.log('POOL CONTENTS:', pool);

      if (pool.length === 0) {
        display.innerHTML = '<p>ERROR: Pool is empty!</p>';
        return;
      }

      // Filter out last
      let available = pool.filter(item => 
        item.type !== lastShown.type || item.content !== lastShown.content
      );

      if (available.length === 0) {
        available = pool;
      }

      console.log('Available items:', available.length);

      // Pick random
      const random = available[Math.floor(Math.random() * available.length)];
      lastShown = random;

      console.log('SELECTED TYPE:', random.type);
      console.log('SELECTED CONTENT:', random.content);

      // Display
      if (random.type === 'phrase') {
        display.innerHTML = '<p>' + random.content + '</p>';
        console.log('✅ DISPLAYED PHRASE');
        
      } else if (random.type === 'image') {
        display.innerHTML = '<img src="' + random.content + '" alt="Art" style="max-width: 100%; border-radius: 8px;">';
        console.log('✅ DISPLAYED IMAGE');
        
      } else if (random.type === 'link') {
        console.log('🔗 DISPLAYING LINK!');
        const link = random.content;
        
        if (link.includes('youtube.com') || link.includes('youtu.be')) {
          let videoId = '';
          if (link.includes('v=')) {
            videoId = link.split('v=')[1].split('&')[0];
          } else {
            const parts = link.split('/');
            videoId = parts[parts.length - 1].split('?')[0];
          }
          display.innerHTML = '<iframe width="100%" height="315" src="https://www.youtube.com/embed/' + videoId + '" frameborder="0" allowfullscreen></iframe>';
          console.log('✅ DISPLAYED YOUTUBE');
        } else {
          display.innerHTML = '<a href="' + link + '" target="_blank" style="color: #ff6b9d; font-size: 1.2rem; text-decoration: underline;">✨ Click for surprise! ✨</a>';
          console.log('✅ DISPLAYED LINK');
        }
      }

      display.style.transform = 'scale(1.05)';
      setTimeout(() => {
        display.style.transform = 'scale(1)';
      }, 200);
    });

    // Add phrase
    document.getElementById('add-phrase').addEventListener('click', function() {
      const newPhrase = document.getElementById('phrase-input').value.trim();
      if (newPhrase !== '') {
        phrases.push(newPhrase);
        set(phrasesRef, phrases).then(() => {
          document.getElementById('phrase-input').value = '';
          document.getElementById('display').innerHTML = '<p>✨ Revelation sent! ✨</p>';
        });
      } else {
        alert('Please write a revelation first! ✨');
      }
    });

    // Add link
    document.getElementById('add-link').addEventListener('click', function() {
      const newLink = document.getElementById('link-input').value.trim();
      
      if (!newLink) {
        alert('Please enter a link! 🔗');
        return;
      }
      
      if (!newLink.startsWith('http://') && !newLink.startsWith('https://')) {
        alert('Link must start with http:// or https://');
        return;
      }
      
      const allowedDomains = [
        'youtube.com', 'youtu.be', 'spotify.com', 'instagram.com',
        'tiktok.com', 'reddit.com', 'wikipedia.org', 'nasa.gov',
        'metmuseum.org', 'museum.unesco.org', 'neal.fun',
        'theuselessweb.com', 'littlevintagephotobooth.com'
      ];
      
      const isAllowed = allowedDomains.some(domain => newLink.includes(domain));
      
      if (isAllowed) {
        links.push(newLink);
        set(linksRef, links).then(() => {
          document.getElementById('link-input').value = '';
          document.getElementById('display').innerHTML = '<p>🔗 Link added! 🔗</p>';
        });
      } else {
        alert('❌ Only links from approved sites!');
      }
    });
    

    // Enter keys
    document.getElementById('phrase-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') document.getElementById('add-phrase').click();
    });
    
    document.getElementById('link-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') document.getElementById('add-link').click();
    });
  // FORCE CREATE LINKS BUTTON
document.getElementById('force-links').addEventListener('click', () => {
  const testLinks = [
    "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
    "https://museum.unesco.org/",
    "https://neal.fun/"
  ];
  
  set(linksRef, testLinks).then(() => {
    alert('✅ Links force-created in Firebase! Reload the page.');
    console.log('Links saved:', testLinks);
  }).catch((error) => {
    alert('❌ Error: ' + error.message);
    console.error('Error:', error);
  });
});
    

    console.log('🎉 App loaded!');
  </script>
</body>
</html>
